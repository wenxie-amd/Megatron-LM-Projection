name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projection
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.16"
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run pytest
        run: uv run pytest

  web:
    name: Web build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.16"
      - name: Set up Python
        run: uv python install 3.12
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Vitest
        working-directory: web
        run: npm test
      - name: Build (rebuilds wheel)
        working-directory: web
        run: npm run build
        env:
          VITE_BASE_PATH: /Megatron-LM-Projection/
