name: custom/DeepSeek-MoE-400B
description: >-
  Custom DeepSeek-MoE-400B (402B total / ~34B activated). DeepSeek-V3-style
  MoE + MLA, 3 dense layers then MoE. 64 layers, hidden 6144, 168 routed +
  1 shared experts, top-8 routing. Not an official release — a scaled-down
  DeepSeek-V3 for projection experiments.

architecture:
  num_layers: 64
  hidden_size: 6144
  ffn_hidden_size: 16384
  vocab_size: 129280
  max_position_embeddings: 163840
  untie_embeddings_and_output_weights: true
  make_vocab_size_divisible_by: 128

attention:
  num_attention_heads: 128
  num_query_groups: 128
  attention_dropout: 0.0
  add_qkv_bias: false
  use_mla: true
  q_lora_rank: 1536
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128

mlp:
  swiglu: true
  add_bias_linear: false

moe:
  enabled: true
  moe_ffn_hidden_size: 2048
  num_routed_experts: 168
  num_shared_experts: 1
  moe_router_topk: 8
  moe_layer_freq: 1
  first_k_dense_replace: 3
  add_router_bias: true

norm:
  normalization: RMSNorm
  layernorm_epsilon: 1.0e-6

position_embedding:
  position_embedding_type: rope
  rotary_base: 10000
  rotary_percent: 1.0
