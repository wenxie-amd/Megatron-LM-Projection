name: moonshotai/Kimi-K2.6
description: Moonshot Kimi K2.6 (1T total / 32B activated). Same architecture as K2 / K2.5; 256K context.

architecture:
  num_layers: 61
  hidden_size: 7168
  ffn_hidden_size: 18432
  vocab_size: 163840
  max_position_embeddings: 262144
  untie_embeddings_and_output_weights: true
  make_vocab_size_divisible_by: 128

attention:
  num_attention_heads: 64
  num_query_groups: 64
  attention_dropout: 0.0
  add_qkv_bias: false
  use_mla: true
  q_lora_rank: 1536
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128

mlp:
  swiglu: true
  add_bias_linear: false

moe:
  enabled: true
  moe_ffn_hidden_size: 2048
  num_routed_experts: 384
  num_shared_experts: 1
  moe_router_topk: 8
  moe_layer_freq: 1
  first_k_dense_replace: 1
  add_router_bias: true

norm:
  normalization: RMSNorm
  layernorm_epsilon: 1.0e-6

position_embedding:
  position_embedding_type: rope
  rotary_base: 50000
  rotary_percent: 1.0
