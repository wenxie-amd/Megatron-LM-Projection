name: deepseek_v2_lite
description: DeepSeek-V2-Lite (16B total / 2.4B activated). MoE + MLA, with the first layer dense.

architecture:
  num_layers: 27
  hidden_size: 2048
  ffn_hidden_size: 10944
  vocab_size: 102400
  max_position_embeddings: 163840
  untie_embeddings_and_output_weights: true
  make_vocab_size_divisible_by: 128

attention:
  num_attention_heads: 16
  num_query_groups: 16
  attention_dropout: 0.0
  add_qkv_bias: false
  use_mla: true
  q_lora_rank: null
  kv_lora_rank: 512
  qk_nope_head_dim: 128
  qk_rope_head_dim: 64
  v_head_dim: 128

mlp:
  swiglu: true
  add_bias_linear: false

moe:
  enabled: true
  moe_ffn_hidden_size: 1408
  num_routed_experts: 64
  num_shared_experts: 2
  moe_router_topk: 6
  moe_layer_freq: 1
  first_k_dense_replace: 1
  add_router_bias: false

norm:
  normalization: RMSNorm
  layernorm_epsilon: 1.0e-6

position_embedding:
  position_embedding_type: rope
  rotary_base: 10000
  rotary_percent: 1.0
